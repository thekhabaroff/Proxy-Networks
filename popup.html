<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proxy Networks</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand-lockup">
          <img class="brand-mark" src="images/logo-brand-48.png" width="32" height="32" alt="" />
          <div>
            <h1>Proxy Networks</h1>
          </div>
        </div>
        <div class="header-actions">
          <a id="versionBadge" class="version-badge" href="https://github.com/thekhabaroff/ProxyNetworks" target="_blank" rel="noopener noreferrer" aria-label="Открыть репозиторий Proxy Networks на GitHub" title="GitHub-репозиторий">v1.0.0</a>
          <a class="telegram-button" href="https://t.me/proxynetworks_bot" target="_blank" rel="noopener noreferrer" aria-label="Открыть Telegram-бот" title="Telegram-бот">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.6 3.4 2.9 10.6c-1.3.5-1.3 1.2-.2 1.6l4.8 1.5 1.8 5.5c.2.6.1.8.8.8.5 0 .7-.2 1-.5l2.3-2.2 4.8 3.5c.9.5 1.5.3 1.8-.8l3.2-15.1c.5-1.4-.5-2-1.6-1.5ZM8.4 13.2l10.8-6.8c.5-.3 1-.1.6.3l-8.7 7.9-.3 3.3-1.7-4.7-.9-.3Z" /></svg>
          </a>
          <button id="settingsButton" class="settings-button" type="button" aria-label="Настройки" title="Настройки">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.25a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5Z" /><path d="m19.1 13.4 1.2.9-1.9 3.3-1.4-.6a7.8 7.8 0 0 1-1.7 1l-.2 1.5h-3.8l-.2-1.5a7.8 7.8 0 0 1-1.7-1l-1.4.6-1.9-3.3 1.2-.9a7.7 7.7 0 0 1 0-2.8l-1.2-.9L8 6.4l1.4.6a7.8 7.8 0 0 1 1.7-1l.2-1.5h3.8l.2 1.5a7.8 7.8 0 0 1 1.7 1l1.4-.6 1.9 3.3-1.2.9a7.7 7.7 0 0 1 0 2.8Z" /></svg>
          </button>
        </div>
      </header>

      <section class="card">
        <label class="toggle">
          <input id="enabledToggle" type="checkbox" />
          <span class="toggle-copy">
            <span id="toggleLabel">Прокси выключен</span>
            <small id="connectionHint">Подключение без прокси</small>
          </span>
        </label>

        <div class="connection-selectors" aria-label="Параметры подключения">
          <label class="field selector-field profile-selector">
            <span class="field-heading">
              <span>Профиль</span>
              <small>CONFIG</small>
            </span>
            <select id="profileSelect" aria-label="Профиль"></select>
          </label>
          <label id="protocolField" class="field selector-field protocol-selector">
            <span class="field-heading">
              <span>Протокол</span>
              <small>ROUTE</small>
            </span>
            <select id="protocolSelect" aria-label="Протокол">
              <option value="auto">Автоматический выбор</option>
              <option value="http">HTTP</option>
              <option value="https">HTTPS</option>
              <option value="socks">SOCKS5</option>
            </select>
          </label>
        </div>

        <div class="live-data">
          <div id="proxyGeoInfo" class="proxy-geo-info hidden" role="status" aria-live="polite">
            <div class="proxy-geo-header">
              <div id="proxyGeoLocation" class="proxy-geo-location">Прокси: определяю локацию…</div>
              <span id="proxyGeoFlag" class="proxy-geo-flag" aria-hidden="true">🌐</span>
            </div>
            <div id="proxyGeoProviderRow" class="proxy-geo-provider-row">
              <span>Провайдер</span>
              <span id="proxyGeoProvider" class="proxy-geo-provider"></span>
            </div>
          </div>
          <div class="live-metrics">
            <div class="metric-row">
              <span class="metric-label">Текущий IP</span>
              <strong id="ipLine" class="metric-value" role="status" aria-live="polite">—</strong>
            </div>
            <div id="pingLine" class="metric-row hidden">
              <span class="metric-label">Пинг</span>
              <strong id="pingValue" class="metric-value ping-value" role="status" aria-live="polite">—</strong>
            </div>
          </div>
        </div>
        <ul id="tipsList" class="tips hidden" aria-label="Советы по диагностике"></ul>
        <button id="refreshIpButton" class="refresh-button" type="button">Обновить IP</button>
      </section>

      <section class="blocking-card" aria-label="Блокировка контента">
        <div class="content-setting">
          <label id="webRtcProtectionLabel" class="content-toggle">
            <input id="webRtcProtection" type="checkbox" />
            <span>Защита от утечек WebRTC</span>
          </label>
          <button
            id="webRtcInfoButton"
            class="info-button"
            type="button"
            aria-label="О защите от утечек WebRTC"
            aria-expanded="false"
            aria-controls="webRtcInfoTip"
          >i</button>
          <div id="webRtcInfoTip" class="info-tooltip hidden" role="tooltip">
            Снижает риск раскрытия реального IP через WebRTC. Может повлиять на звонки и P2P-соединения.
          </div>
        </div>
        <div class="content-setting">
          <label class="content-toggle">
            <input id="blockTracking" type="checkbox" />
            <span>Блокировать трекеры</span>
          </label>
          <button
            id="blockTrackingInfoButton"
            class="info-button"
            type="button"
            aria-label="О блокировке трекеров"
            aria-expanded="false"
            aria-controls="blockTrackingInfoTip"
          >i</button>
          <div id="blockTrackingInfoTip" class="info-tooltip hidden" role="tooltip">
            Блокирует известные домены трекеров. Работает независимо от состояния прокси.
          </div>
        </div>
        <div class="protection-summary" aria-label="Статистика защиты">
          <div id="webRtcProtectionStatus" class="protection-status" role="status" aria-live="polite">WebRTC: проверка…</div>
        </div>
      </section>

      <section id="errorBanner" class="banner hidden" role="alert" aria-live="assertive"></section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
